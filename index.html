<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayLú Colombian Delights</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff;
      color: #111;
    }

    .fondo {
      min-height: 100vh;
      padding: 25px 15px;
      background:
        radial-gradient(circle at 20% 20%, #000 0 18px, transparent 19px),
        radial-gradient(circle at 80% 30%, #000 0 28px, transparent 29px),
        radial-gradient(circle at 35% 75%, #000 0 22px, transparent 23px),
        radial-gradient(circle at 70% 85%, #000 0 18px, transparent 19px),
        #fff;
      background-size: 220px 220px;
    }

    .card {
      max-width: 430px;
      margin: auto;
      background: rgba(255,255,255,0.94);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.18);
    }

    .logo {
      width: 160px;
      max-width: 80%;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      margin: 5px 0;
      font-size: 30px;
    }

    .sub {
      font-size: 17px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: #000;
      color: #fff;
      padding: 16px;
      margin: 13px 0;
      border-radius: 18px;
      font-size: 20px;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .menu-img {
      width: 100%;
      border-radius: 22px;
      margin-top: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="fondo">
    <div class="card">

      <!-- Logo -->
      <img class="logo" src="logo.png" alt="DayLú Logo">

      <h1>DayLú</h1>
      <div class="sub">Colombian Delights 🐄🥄✨</div>

      <!-- Botón de pedido -->
      <a class="btn" href="https://wa.me/19087263381" target="_blank">
        🥄 Haz tu pedido aquí
      </a>

      <!-- Ubicación corregida -->
      <a class="btn" href="https://maps.google.com/?q=Daylu+Colombian+delights+Bound+Brook+NJ" target="_blank">
        📍 Cómo llegar
      </a>

      <!-- Redes -->
      <a class="btn" href="https://www.instagram.com/daylu.colombian" target="_blank">
        📸 Instagram
      </a>

      <a class="btn" href="https://www.tiktok.com/@daylucolombian" target="_blank">
        🎵 TikTok
      </a>

      <!-- Menú -->
      <a class="btn" href="IMG_4852.jpeg" target="_blank">
        📋 Ver menú
      </a>

      <!-- Imagen visible del menú -->
      <img class="menu-img" src="IMG_4852.jpeg" alt="Menú DayLú">

      <div class="footer">
        Haz parte de la familia Daylunática 🐄🥄✨
      </div>

    </div>
  </div>
</body>
</html>
