<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayLú Colombian Delights</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow-x:hidden;
}

#video-fondo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.capa{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

.contenido{
  padding:35px 18px 70px;
}

.logo{
  width:170px;
  max-width:75%;
  border-radius:50%;
  margin:20px auto;
  display:block;
}

h1{
  font-size:44px;
  line-height:1.1;
  margin:20px auto 10px;
  text-shadow:0 4px 8px black;
}

.emojis{
  font-size:36px;
  margin-bottom:30px;
  text-shadow:0 4px 8px black;
}

.boton{
  display:block;
  width:90%;
  max-width:620px;
  margin:18px auto;
  padding:21px;
  background:white;
  color:black;
  text-decoration:none;
  font-size:28px;
  font-weight:bold;
  border-radius:30px;
  border:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.45);
}

.boton:active{
  transform:scale(0.98);
}

#menu{
  display:none;
  margin-top:35px;
}

.titulo-menu{
  font-size:45px;
  font-weight:bold;
  margin-bottom:20px;
  text-shadow:0 4px 8px black;
}

.menu-img{
  width:94%;
  max-width:720px;
  border-radius:22px;
  margin:16px auto;
  display:block;
  box-shadow:0 8px 22px rgba(0,0,0,0.5);
}

.footer{
  margin-top:35px;
  font-size:20px;
  font-weight:bold;
  text-shadow:0 4px 8px black;
}

@media(max-width:600px){
  h1{font-size:38px;}
  .boton{font-size:25px;}
  .titulo-menu{font-size:40px;}
}
</style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay muted loop playsinline id="video-fondo">
  <source src="IMG_4374.mov" type="video/quicktime">
  <source src="IMG_4374.MOV" type="video/quicktime">
  <source src="video-fondo.mp4" type="video/mp4">
  <source src="video-fondo.mp4..MOV" type="video/quicktime">
</video>

<div class="capa"></div>

<div class="contenido">

  <!-- LOGO -->
  <img class="logo" src="logo.png" alt="Logo DayLú">

  <h1>Haz parte de la familia Daylunática</h1>
  <div class="emojis">🐄🥄✨</div>

  <a class="boton" href="https://wa.me/19087263381" target="_blank">
    Haz tu pedido aquí 📲
  </a>

  <a class="boton" href="https://maps.google.com/?q=Daylu+Colombian+delights+Bound+Brook+NJ" target="_blank">
    Aquí te esperamos 📍
  </a>

  <a class="boton" href="https://www.instagram.com/daylu.colombian" target="_blank">
    Instagram 📸
  </a>

  <a class="boton" href="https://www.tiktok.com/@daylucolombian" target="_blank">
    TikTok 🎵
  </a>

  <!-- BOTÓN MENÚ -->
  <button class="boton" onclick="mostrarMenu()">
    Menú 📋
  </button>

  <!-- MENÚ OCULTO -->
  <div id="menu">
    <div class="titulo-menu">Nuestro Menú</div>

    <img class="menu-img" src="17ad70c2-8e4b-42ef-971d-171412aadbe3.JPG" alt="Menú DayLú parte 1">

    <img class="menu-img" src="IMG_4852.jpeg" alt="Menú DayLú parte 2">

    <img class="menu-img" src="IMG_5481.jpeg" alt="Menú DayLú parte 3">
  </div>

  <div class="footer">
    DayLú Colombian Delights 🐄🥄✨
  </div>

</div>

<script>
function mostrarMenu(){
  var menu = document.getElementById("menu");
  if(menu.style.display === "none" || menu.style.display === ""){
    menu.style.display = "block";
    menu.scrollIntoView({behavior:"smooth"});
  } else {
    menu.style.display = "none";
  }
}
</script>

</body>
</html>
